<div class="auth-page">
  <form class="auth-card">

    <div class="auth-logo">TaskZ</div>
    <h4 class="auth-title">Welcome Back</h4>

    <div class="form-group">
      <label for="loginEmail">Email or Username</label>
      <input name="email" [(ngModel)]="userLogin.Email" type="email" id="loginEmail" class="auth-input" placeholder="example@email.com" />
    </div>

    <div class="form-group">
      <label for="loginPassword">Password</label>
      <input name="password" [(ngModel)]="userLogin.Password" type="password" id="loginPassword" class="auth-input" placeholder="••••••••" />
    </div>

    <div class="auth-row">
      <label class="checkbox-label">
        <input type="checkbox" id="loginCheck" checked />
        Remember me
      </label>
      <a class="auth-link" routerLink="/forgot-password">Forgot password?</a>
    </div>

    <button (click)="onLogin()" type="button" class="auth-btn">Sign in</button>

    <p class="auth-footer">Don't have an account? <a class="auth-link" routerLink="/register">Register</a></p>

  </form>
</div>
