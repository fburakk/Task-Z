<div class="projects-container">

  <div class="workspace-section" *ngFor="let workspace of workspaces">
    <!-- Workspace name -->
    <h2 class="workspace-title">{{ workspace.name }}</h2>

    <!-- Cards -->
    <div class="card-grid">
      <ng-container *ngIf="boardsByWorkspace[workspace.id] && boardsByWorkspace[workspace.id].length > 0; else noBoards">
        <a
          class="project-card"
          *ngFor="let board of boardsByWorkspace[workspace.id]"
          [routerLink]="['/project', board.id]"
        >
          <h3 class="card-title">{{ board.name }}</h3>
        </a>
      </ng-container>

      <ng-template #noBoards>
        <div class="project-card project-card--empty">
          <h3 class="card-title">No boards available</h3>
        </div>
      </ng-template>

      <div class="project-card project-card--add" (click)="openBoardModal(workspace.id)">
        <h3 class="card-title">+ Yeni proje</h3>
      </div>
    </div>
  </div>

  <!-- Add Board Modal -->
  <div *ngIf="showBoardModal" class="modal">
    <div class="modal-background" (click)="closeBoardModal()"></div>
    <div class="modal-content">
      <div class="modal-box">
        <button class="close-button" (click)="closeBoardModal()">×</button>
        <h3 class="modal-title">Yeni Proje Oluştur</h3>

        <input
          class="modal-input"
          [(ngModel)]="newBoardName"
          type="text"
          placeholder="Proje ismini girin"
        />

        <div class="modal-buttons">
          <button class="modal-button create" (click)="createNewBoard()">Oluştur</button>
          <button class="modal-button cancel" (click)="closeBoardModal()">İptal</button>
        </div>
      </div>
    </div>
  </div>

</div>
