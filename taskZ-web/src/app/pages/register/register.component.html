<div class="auth-page">
  <form class="auth-card">

    <div class="auth-logo">TaskZ</div>
    <h4 class="auth-title">Create Account</h4>

    <div class="form-group">
      <label for="registerName">Name</label>
      <input name="name" [(ngModel)]="userRegisterObj.firstName" type="text" id="registerName" class="auth-input" placeholder="Name" />
    </div>

    <div class="form-group">
      <label for="registerSurname">Surname</label>
      <input name="surname" [(ngModel)]="userRegisterObj.lastName" type="text" id="registerSurname" class="auth-input" placeholder="Surname" />
    </div>

    <div class="form-group">
      <label for="registerUsername">Username</label>
      <input name="username" [(ngModel)]="userRegisterObj.username" type="text" id="registerUsername" class="auth-input" placeholder="Username" />
    </div>

    <div class="form-group">
      <label for="registerEmail">Email</label>
      <input name="email" [(ngModel)]="userRegisterObj.email" type="email" id="registerEmail" class="auth-input" placeholder="example@email.com" />
    </div>

    <div class="form-group">
      <label for="registerPassword">Password</label>
      <input name="password" [(ngModel)]="userRegisterObj.password" type="password" id="registerPassword" class="auth-input" placeholder="••••••••" />
    </div>

    <div class="form-group">
      <label for="registerRepeatPassword">Repeat Password</label>
      <input type="password" id="registerRepeatPassword" class="auth-input" placeholder="••••••••" />
    </div>

    <label class="checkbox-label mb-4">
      <input class="me-2" type="checkbox" id="registerCheck" checked />
      I agree to the terms
    </label>

    <button (click)="onRegister()" type="button" class="auth-btn">Sign up</button>

    <p class="auth-footer">Already have an account? <a class="auth-link" routerLink="/login">Login here</a></p>

  </form>
</div>
